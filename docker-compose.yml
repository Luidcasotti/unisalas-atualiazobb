services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: unisalas-app
    restart: unless-stopped
    ports:
      - "8935:80"
    environment:
      APP_NAME: UniSalas
      APP_ENV: production
      APP_KEY: base64:/oqriIgro3XXk/YCHrQPeFRwcqHWmI8/QVCOVbvu5wk=
      APP_DEBUG: "false"
      APP_URL: http://localhost:8935
      APP_TIMEZONE: America/Sao_Paulo
      APP_LOCALE: pt_BR
      APP_FALLBACK_LOCALE: pt_BR
      APP_FAKER_LOCALE: pt_BR
      LOG_CHANNEL: stack
      LOG_STACK: single
      LOG_LEVEL: debug
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: reserva_salas
      DB_USERNAME: unisalas
      DB_PASSWORD: unisalas_senha
      SESSION_DRIVER: file
      SESSION_LIFETIME: 120
      SESSION_ENCRYPT: "false"
      SESSION_PATH: /
      SESSION_DOMAIN: null
      SESSION_SECURE_COOKIE: "false"
      SESSION_SAME_SITE: lax
      CACHE_STORE: file
      QUEUE_CONNECTION: sync
      BROADCAST_CONNECTION: log
      FILESYSTEM_DISK: local
      MAIL_MAILER: log
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - unisalas_storage:/var/www/html/storage

  db:
    image: mariadb:10.11
    container_name: unisalas-db
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: reserva_salas
      MARIADB_USER: unisalas
      MARIADB_PASSWORD: unisalas_senha
      MARIADB_ROOT_PASSWORD: unisalas_root_senha
      TZ: America/Sao_Paulo
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h 127.0.0.1 -u root -p$${MARIADB_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    volumes:
      - unisalas_db:/var/lib/mysql
      - ./docs/database_unisalas.sql:/docker-entrypoint-initdb.d/01-database.sql:ro

volumes:
  unisalas_db:
  unisalas_storage:
